<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Test Task | DevOps Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; display: flex; gap: 40px; background-color: #f4f7f6; color: #333; }
        .left-panel { flex: 1; max-width: 400px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .right-panel { flex: 1; display: flex; flex-direction: column; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; margin-bottom: 10px; background-color: #25D366; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #128C7E; }
        .secondary-btn { background-color: #34b7f1; }
        textarea { width: 100%; height: 500px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; resize: none; box-sizing: border-box; font-family: 'Consolas', monospace; background-color: #272822; color: #f8f8f2; font-size: 13px; }
        .metrics { margin-top: 10px; font-size: 12px; color: #666; font-style: italic; }
        h3 { margin-top: 0; color: #075E54; }
    </style>
</head>
<body>
    <div class="left-panel">
        <h3>Параметры инстанса</h3>
        <input type="text" id="idInstance" placeholder="idInstance (напр. 1101000001)">
        <input type="text" id="apiTokenInstance" placeholder="ApiTokenInstance">

        <button onclick="makeRequest('getSettings')">getSettings</button>
        <button onclick="makeRequest('getStateInstance')">getStateInstance</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <input type="text" id="phoneMessage" placeholder="77771234567 (без +)">
        <input type="text" id="messageText" placeholder="Текст сообщения">
        <button class="secondary-btn" onclick="sendMessage()">sendMessage</button>

        <input type="text" id="phoneFile" placeholder="77771234567">
        <input type="text" id="fileUrl" placeholder="https://example.com/image.png">
        <button class="secondary-btn" onclick="sendFileByUrl()">sendFileByUrl</button>
    </div>

    <div class="right-panel">
        <h3>Ответ API:</h3>
        <textarea id="responseArea" readonly placeholder="Здесь появится ответ сервера..."></textarea>
        <div id="metricsArea" class="metrics"></div>
    </div>

    <script>
        async function request(method, type = 'GET', body = null) {
            const id = document.getElementById('idInstance').value.trim();
            const token = document.getElementById('apiTokenInstance').value.trim();
            const responseArea = document.getElementById('responseArea');
            const metricsArea = document.getElementById('metricsArea');

            if (!id || !token) { alert('Заполните idInstance и ApiTokenInstance'); return; }

            const url = `https://api.green-api.com/waInstance${id}/${method}/${token}`;
            const startTime = performance.now();

            try {
                const options = { method: type };
                if (body) {
                    options.headers = { 'Content-Type': 'application/json' };
                    options.body = JSON.stringify(body);
                }

                const response = await fetch(url, options);
                const data = await response.json();
                
                const duration = (performance.now() - startTime).toFixed(0);
                responseArea.value = JSON.stringify(data, null, 4);
                metricsArea.innerText = `Latency: ${duration}ms | Status: ${response.status} | Timestamp: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                responseArea.value = "Ошибка: " + e.message;
            }
        }

        function makeRequest(method) { request(method); }
        
        function sendMessage() {
            const phone = document.getElementById('phoneMessage').value.trim();
            const text = document.getElementById('messageText').value.trim();
            request('sendMessage', 'POST', { chatId: `${phone}@c.us`, message: text });
        }

        function sendFileByUrl() {
            const phone = document.getElementById('phoneFile').value.trim();
            const url = document.getElementById('fileUrl').value.trim();
            const fileName = url.split('/').pop() || 'file';
            request('sendFileByUrl', 'POST', { chatId: `${phone}@c.us`, urlFile: url, fileName: fileName });
        }
    </script>
</body>
</html>
